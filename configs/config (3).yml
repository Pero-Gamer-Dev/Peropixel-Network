header-footer:
  enabled: true
  designs:
    world-world1:
      display-condition: '%world%=world1'
      header:
      - an example of world with custom
      footer:
      - header/footer and prefix/suffix
    world-world2:world3:
      display-condition: '%world%=world2|%world%=world3'
      header:
      - This is a shared header for
      - world2 and world3
      footer: []
    server-server1:
      display-condition: '%server%=server1'
      header:
      - an example of server with custom header
      footer: []
    default:
      display-condition: '%world%!=disabledworld'
      header:
      - '&#1032FB&lᴘ&#1833FC&lᴇ&#2034FC&lʀ&#2835FD&lᴏ&#3037FD&lᴘ&#3838FE&lɪ&#4039FE&lx&#483AFF&lᴇ&#503BFF&lʟ '
      - ''
      - '&r&bOnline: &f%online%  |  &bPing: &f%ping%'
      - ''
      footer:
      - '&b&mᴅɪѕᴄᴏʀᴅ &r&7| &r&d&mѕᴛᴏʀᴇ &7|&c&mʏᴏᴜᴛᴜʙᴇ'
      - ''
      - ''
      - ''
tablist-name-formatting:
  enabled: true
  disable-condition: '%world%=disabledworld'
scoreboard-teams:
  enabled: true
  enable-collision: true
  invisible-nametags: false
  sorting-types:
  - GROUPS:god-of-legend,owner,executive,developer,manager,sradmin,jradmin,srmod,jrmod,builder,bt+,bt,helper,mvp++,mvp+,mvp,vip+,vip,member,default
  - PLACEHOLDER_A_TO_Z:%player%
  case-sensitive-sorting: true
  can-see-friendly-invisibles: false
  disable-condition: '%world%=disabledworld'
belowname-objective:
  enabled: false
  disable-condition: '%world%=disabledworld'
  fancy-value-default: NPC
  fancy-value: '&c%health%'
  value: '%health%'
  title: '&cHealth'
prevent-spectator-effect:
  enabled: false
bossbar:
  enabled: true
  toggle-command: /bossbar
  remember-toggle-choice: false
  hidden-by-default: false
  bars:
    ServerInfo:
      style: NOTCHED_10
      color: GREEN
      progress: '100'
      text: '&#0093FF&lJOIN OUR DISCORD SERVER FOR UPDATES'
scoreboard:
  enabled: true
  toggle-command: /sb
  remember-toggle-choice: false
  hidden-by-default: false
  delay-on-join-milliseconds: 0
  scoreboards:
    scoreboard:
      title: '&#1032FB&lᴘ&#1833FC&lᴇ&#2034FC&lʀ&#2835FD&lᴏ&#3037FD&lᴘ&#3838FE&lɪ&#4039FE&lx&#483AFF&lᴇ&#503BFF&lʟ '
      lines:
      - ' &#CECECE⌚ %server_time_d MMM yyyy%'
      - ''
      - '&#2FCCFF%player_name%'
      - '&#FF9300☄ &fRank: %vault_prefix%'
      - '&#0CFF00&l$ &fMoney: &#0CFF00$%vault_eco_balance_formatted%'
      - '&#FFDE00⛃ &fCoins: &#FFDE00%playerpoints_points_formatted%'
      - '&#0096FF🗡 &fKills: &#0096FF%statistic_player_kills%'
      - '&#FF0000❤ &fHearts: &#FF0000%lifesteal_hearts%'
      - ''
      - '&#FB08BF⚐ &fPing: &#FB08BF%ping%'
      - '&#FFCF00✉ &fOnline: &#FFCF00%online%'
      - ''
      - '  &#CECECEᴘʟᴀʏ.ᴘᴇʀᴏᴘɪxᴇʟ.ɴᴇᴛ  '
layout:
  enabled: false
  direction: COLUMNS
  default-skin: mineskin:1753261242
  enable-remaining-players-text: true
  remaining-players-text: '... and %s more'
  empty-slot-ping-value: 1000
  layouts:
    default:
      fixed-slots:
      - '1|&3Website&f:'
      - 2|&bmyserver.net
      - '3|&8&m                        '
      - '4|&3Name&f:'
      - 5|&b%player%
      - '7|&3Rank&f:'
      - '8|Rank: %group%'
      - '10|&3World&f:'
      - 11|&b%world%
      - '13|&3Time&f:'
      - 14|&b%time%
      - '21|&3Teamspeak&f:'
      - 22|&bts.myserver.net
      - '23|&8&m                        '
      - '41|&3Store&f:'
      - 42|&bshop.myserver.net
      - '43|&8&m                        '
      groups:
        staff:
          slots:
          - 24-40
          display-condition: permission:tab.staff
        players:
          slots:
          - 44-80
placeholders:
  date-format: dd.MM.yyyy
  time-format: '[HH:mm:ss / h:mm a]'
  time-offset: 0
  register-tab-expansion: true
  locale: en-US
placeholder-output-replacements:
  '%essentials_vanished%':
    'yes': '&7| Vanished'
    'no': ''
  '%essentials_nickname%':
    '%essentials_nickname%': '%player%'
conditions:
  nick:
    conditions:
    - '%player%=%essentials_nickname%'
    true: '%player%'
    false: ~%essentials_nickname%
assign-groups-by-permissions: false
primary-group-finding-list:
  - god-of-legend
  - owner
  - executive
  - developer
  - manager
  - sradmin
  - jradmin
  - srmod
  - jrmod
  - builder
  - bt+
  - bt
  - helper
  - mvp++
  - mvp+
  - mvp
  - vip+
  - vip
  - member
  - default
debug: false
mysql:
  enabled: false
  host: 127.0.0.1
  port: 3306
  database: tab
  username: user
  password: password
per-world-playerlist:
  enabled: false
  allow-bypass-permission: false
  ignore-effect-in-worlds:
  - ignoredworld
  - build
  shared-playerlist-world-groups:
    lobby:
    - lobby1
    - lobby2
    minigames:
    - paintball
    - bedwars
global-playerlist:
  enabled: false
  display-others-as-spectators: false
  display-vanished-players-as-spectators: true
  isolate-unlisted-servers: false
  spy-servers:
  - spyserver1
  - spyserver2
  server-groups:
    lobbies:
    - lobby1
    - lobby2
    group2:
    - server1
    - server2
  update-latency: false
use-bukkit-permissions-manager: false
use-online-uuid-in-tablist: true
ping-spoof:
  enabled: false
playerlist-objective:
  enabled: false
  value: '%ping%'
  fancy-value: '&7Ping: %ping%'
  title: TAB
  render-type: INTEGER
permission-refresh-interval: 1000
compensate-for-packetevents-bug: false
proxy-support:
  enabled: true
  type: PLUGIN
  plugin:
    name: RedisBungee
  redis:
    url: redis://:password@localhost:6379/0
  rabbitmq:
    exchange: plugin
    url: amqp://guest:guest@localhost:5672/%2F
  channel-name-suffix: TAB
placeholder-refresh-intervals:
  default-refresh-interval: 500
  '%server_uptime%': 1000
  '%server_tps_1_colored%': 1000
  '%server_unique_joins%': 5000
  '%player_health%': 200
  '%player_ping%': 1000
  '%vault_prefix%': 1000
  '%rel_factionsuuid_relation_color%': 1000
config-version: 6
components:
  minimessage-support: true
  disable-shadow-for-heads: true